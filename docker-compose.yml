version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: Lumina_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: Lumina
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: Lumina_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/Lumina
      - JWT_SECRET=shristi16112004
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: Lumina_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
